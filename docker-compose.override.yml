services:
  db:
    environment:
      MYSQL_DATABASE: hangman_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: forge
      MYSQL_PASSWORD: forge
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
  app:
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
volumes:
  db_data:
    driver: local
